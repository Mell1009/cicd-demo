name: CI/CD Pipeline - Taller Demo

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  backend-ci:
    name: "Backend CI - Compilar y Testear"
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar con Maven
        run: mvn clean package -DskipTests

      - name: Ejecutar pruebas unitarias
        run: mvn test

  docker-build:
    name: "Docker Build - Generar imagen"
    runs-on: ubuntu-latest
    needs: backend-ci

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar JAR
        run: mvn clean package -DskipTests

      - name: Construir imagen Docker
        run: docker build -t cicd-demo:latest .

      - name: Verificar imagen creada
        run: docker images cicd-demo
        